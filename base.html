<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI FAQ Conversational SaaS Core Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm border-bottom py-3">
        <div class="container">
            <a class="navbar-brand navbar-brand-saas text-primary" href="{{ url_for('index') }}"><i class="bi bi-robot me-2"></i>FAQ.AI Engine</a>
            <button class="navbar-expand-toggle btn d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#saasNav">
                <i class="bi bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="saasNav">
                <ul class="navbar-nav ms-auto gap-2 align-items-center">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('chatbot') }}">Live App Studio</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('admin') }}">Admin Panel Console</a></li>
                    <li class="nav-item">
                        <button id="theme-toggle" class="btn btn-sm btn-outline-secondary" aria-label="Toggle system interface visualization matrix profile context layout modes"><i class="bi bi-brightness-high-fill"></i></button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}
                    <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
                        {{ msg }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
